{% extends "base.html" %}
{% block content %}

<div class="container my-5" style="max-width: 900px;">

    <!-- PAGE TITLE -->
    <h2 class="fw-bold mb-4">➕ Create Blog</h2>

    <form method="POST" enctype="multipart/form-data">

        <!-- ================= BASIC INFO ================= -->
        <div class="card mb-4 shadow-sm">
            <div class="card-body">
                <h5 class="fw-bold mb-3">📌 Basic Information</h5>

                <div class="mb-3">
                    <label class="form-label">Title</label>
                    <input type="text" name="title" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Category</label>
                    <select name="category" class="form-select" required>
                        {% for cat in categories %}
                            <option value="{{ cat }}">{{ cat }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>
        </div>

        <!-- ================= MEDIA ================= -->
        <div class="card mb-4 shadow-sm">
            <div class="card-body">
                <h5 class="fw-bold mb-3">🖼 Media</h5>

                <div class="mb-3">
                    <label class="form-label">Upload Image</label>
                    <input type="file" name="image" class="form-control" accept="image/*">
                </div>

                <div class="mb-3">
                    <label class="form-label">🎥 YouTube Video (Embed URL)</label>
                    <input type="url"
                           name="video_url"
                           class="form-control"
                           placeholder="https://www.youtube.com/embed/VIDEO_ID">
                    <small class="text-muted">
                        Example: https://www.youtube.com/embed/pAmemTkFkgk
                    </small>
                </div>
            </div>
        </div>

        <!-- ================= CONTENT ================= -->
        <div class="card mb-4 shadow-sm">
            <div class="card-body">
                <h5 class="fw-bold mb-3">📝 Blog Content</h5>

                <textarea name="content"
                          rows="6"
                          class="form-control"
                          placeholder="Write your blog content here..."
                          required></textarea>
            </div>
        </div>

        <!-- ================= INGREDIENTS ================= -->
        <div class="card mb-4 shadow-sm">
            <div class="card-body">
                <h5 class="fw-bold mb-3">🧺 Ingredients</h5>

                <textarea name="ingredients"
                          rows="5"
                          class="form-control"
                          placeholder="One ingredient per line"></textarea>
            </div>
        </div>

        <!-- ================= STEPS ================= -->
        <div class="card mb-4 shadow-sm">
            <div class="card-body">
                <h5 class="fw-bold mb-3">👨‍🍳 Preparation Steps</h5>

                <textarea name="steps"
                          rows="5"
                          class="form-control"
                          placeholder="One step per line"></textarea>
            </div>
        </div>

        <!-- ================= NUTRITION ================= -->
        <div class="card mb-4 shadow-sm">
            <div class="card-body">
                <h5 class="fw-bold mb-3">🥗 Nutrition Highlights</h5>

                <textarea name="nutrition"
                          rows="4"
                          class="form-control"
                          placeholder="One nutrition point per line"></textarea>
            </div>
        </div>

        <!-- ================= TIPS ================= -->
        <div class="card mb-4 shadow-sm">
            <div class="card-body">
                <h5 class="fw-bold mb-3">💡 Tips & Variations</h5>

                <textarea name="tips"
                          rows="4"
                          class="form-control"
                          placeholder="One tip per line"></textarea>
            </div>
        </div>

        <!-- ================= SUBMIT ================= -->
        <button class="btn btn-danger w-100 py-2 fw-semibold">
            🚀 Publish Blog
        </button>

    </form>

</div>

{% endblock %}
