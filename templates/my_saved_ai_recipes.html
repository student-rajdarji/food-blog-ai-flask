{% extends "base.html" %}
{% block content %}

<div class="container mt-5">
    <h2 class="text-center mb-4">❤️ My Saved AI Recipes</h2>

    {% if recipes %}
        {% for r in recipes %}
        <div class="recipe-box mb-4">
            {{ r.recipe|safe }}
        </div>
        {% endfor %}
    {% else %}
        <p class="text-center text-muted">No saved recipes yet.</p>
    {% endif %}
</div>

{% endblock %}
